<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>xietyMap</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/popup.css">
<link rel="stylesheet" href="css/mobile.css">

</head>

<body>

<div id="app">

<!-- MAP -->

<div id="map"></div>

<!-- TOP BAR -->

<div id="topBar">

<div id="logo">
xietyMap
</div>

<div id="searchWrapper">

<div id="searchIcon">
🔍
</div>

<input
id="searchInput"
placeholder="Find cafés, bars, study spots..."
/>

</div>

</div>

<!-- LIVE PANEL -->

<div id="livePanel">

<div class="liveStat">

<div class="statNumber" id="onlineUsers">
436
</div>

<div class="statLabel">
Online
</div>

</div>

<div class="liveStat">

<div class="statNumber" id="reportCount">
1254
</div>

<div class="statLabel">
Live Updates
</div>

</div>

</div>

<!-- BOTTOM NAV -->

<div id="bottomNav">

<button class="navBtn active">

<div class="navIcon">
🗺️
</div>

<span>
Map
</span>

</button>

<button
class="navBtn"
onclick="window.location.href='favorites.html'"
>

<div class="navIcon">
🖤
</div>

<span>
Favorites
</span>

</button>

<button
class="navBtn"
onclick="toggleNightlife()"
>

<div class="navIcon">
🌙
</div>

<span>
Nightlife
</span>

</button>

</div>

</div>

<!-- MOOD SYSTEM -->

<script>

const selectedMood =
localStorage.getItem(
'selectedMood'
);

console.log(
'Selected Mood:',
selectedMood
);

</script>

<!-- SCRIPTS -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="js/app.js"></script>
<script src="js/places.js"></script>
<script src="js/favorites.js"></script>
<script src="js/map.js"></script>
<script src="js/search.js"></script>
<script src="js/reports.js"></script>
<script src="js/comments.js"></script>
<script src="js/filters.js"></script>
<script src="js/photos.js"></script>
<script src="js/nightlife.js"></script>
<script src="js/notifications.js"></script>

</body>
</html>
